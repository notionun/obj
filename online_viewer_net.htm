<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부쟈 프로필 카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f7eef4;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(242,167,179,0.18) 0%, transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(200,170,240,0.18) 0%, transparent 45%),
      radial-gradient(circle at 60% 10%, rgba(168,210,234,0.12) 0%, transparent 40%);
    font-family: 'Noto Sans KR', sans-serif;
    padding: 40px 16px;
  }

  .card {
    width: 380px;
    background: #FFF8F5;
    border-radius: 28px;
    overflow: hidden;
    border: 1.5px solid rgba(240,180,190,0.4);
    box-shadow:
      0 4px 24px rgba(220,150,170,0.13),
      0 1px 4px rgba(200,150,180,0.08);
  }

  /* ── TOP ── */
  .card-top {
    background: linear-gradient(160deg, #fce8ee 0%, #f3e2f8 55%, #e8f0fc 100%);
    padding: 30px 28px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .deco-dots {
    position: absolute;
    top: 14px; left: 18px;
    display: flex; gap: 5px;
  }
  .deco-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    opacity: 0.6;
  }

  .deco-star {
    position: absolute;
    font-size: 13px;
    opacity: 0.45;
    line-height: 1;
    font-style: normal;
  }

  /* photo */
  .photo-wrap { position: relative; }

  .photo-ring {
    width: 148px; height: 148px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #f7b8c8, #c9b0ef, #a8d8ea, #f7e0a0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-ring img {
    width: 142px; height: 142px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid #fff;
    display: block;
  }

  .photo-badge {
    position: absolute;
    bottom: 4px; right: -6px;
    background: white;
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 11px;
    font-weight: 700;
    color: #d06a85;
    border: 1.5px solid rgba(240,180,190,0.5);
    box-shadow: 0 2px 8px rgba(200,140,160,0.12);
    white-space: nowrap;
  }

  /* name */
  .name-area {
    margin-top: 14px;
    text-align: center;
    padding-bottom: 22px;
  }

  .name-main {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #3a2e38;
    letter-spacing: 4px;
    line-height: 1.1;
  }

  .name-sub {
    font-size: 10.5px;
    color: #b090a0;
    letter-spacing: 3px;
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(210,160,180,0.35), rgba(180,150,220,0.35), transparent);
  }

  /* ── BODY ── */
  .card-body {
    padding: 20px 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .row-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #c490a8;
    min-width: 58px;
    padding-top: 4px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .row-content {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
    align-items: center;
  }

  .tag {
    font-size: 12px;
    padding: 3px 11px;
    border-radius: 20px;
    font-weight: 500;
    line-height: 1.5;
  }
  .t-pink   { background: #fde8ee; color: #c0607a; }
  .t-purple { background: #ede5f8; color: #8055b8; }
  .t-yellow { background: #fdf5d8; color: #9a7d28; }
  .t-mint   { background: #daf2ea; color: #3a8a6a; }
  .t-blue   { background: #deeaf8; color: #3a6a9a; }
  .t-peach  { background: #fde8df; color: #b85a3a; }

  .plain-text {
    font-size: 13px;
    color: #5a4a52;
    line-height: 1.6;
  }

  /* activity bars */
  .activity-col {
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex: 1;
  }

  .bar-line {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-name {
    font-size: 11px;
    color: #a08898;
    width: 68px;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: #f0e8ec;
    border-radius: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 10px;
  }
  .bf-pink   { background: linear-gradient(90deg, #f7a0b4, #f5c8d0); }
  .bf-purple { background: linear-gradient(90deg, #c0a0e8, #d8c8f0); }
  .bf-yellow { background: linear-gradient(90deg, #f0c860, #f5e090); }

  .bar-pct {
    font-size: 10px;
    font-weight: 700;
    color: #c490a8;
    width: 26px;
    text-align: right;
  }

  /* ── BOTTOM STRIP ── */
  .card-bottom {
    background: linear-gradient(90deg, #fce8ee, #f0e4f8, #e4eef8);
    padding: 12px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    border-top: 1px solid rgba(220,180,200,0.22);
  }

  .strip-item {
    font-size: 10.5px;
    color: #a08898;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .sep {
    color: #ddb8c8;
    font-size: 10px;
  }
</style>
</head>
<body>

<div class="card">

  <!-- TOP -->
  <div class="card-top">
    <div class="deco-dots">
      <div class="deco-dot" style="background:#f7a0b4"></div>
      <div class="deco-dot" style="background:#c8a8e8"></div>
      <div class="deco-dot" style="background:#a8cce8"></div>
    </div>
    <span class="deco-star" style="top:16px;right:22px;color:#c8a0e0">✦</span>
    <span class="deco-star" style="top:52px;right:42px;color:#f0b0c0;font-size:9px">✧</span>
    <span class="deco-star" style="top:36px;left:42px;color:#a0c8e8;font-size:9px">✦</span>

    <div class="photo-wrap">
      <div class="photo-ring">
        <img
          src="https://raw.githubusercontent.com/dys1537-netizen/obj/refs/heads/main/from-PixAI-2006824781371567093-1.png"
          alt="부쟈 프로필 사진"
        />
      </div>
      <div class="photo-badge">♡ 성인</div>
    </div>

    <div class="name-area">
      <div class="name-main">부 쟈</div>
      <div class="name-sub">profile · 마누라 앓이 전문</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- BODY -->
  <div class="card-body">

    <div class="row">
      <span class="row-label">Platform</span>
      <div class="row-content">
        <span class="tag t-pink">팅글</span>
        <span class="tag t-purple">블룸</span>
        <span class="tag t-yellow">로판</span>
      </div>
    </div>

    <div class="row">
      <span class="row-label">트윗 성향</span>
      <div class="row-content">
        <span class="tag t-peach">맘찍</span>
        <span class="tag t-mint">일상</span>
        <span class="tag t-pink">앓이</span>
      </div>
    </div>

    <div class="row">
      <span class="row-label">활동 성향</span>
      <div class="activity-col">
        <div class="bar-line">
          <span class="bar-name">마누라 앓이</span>
          <div class="bar-track"><div class="bar-fill bf-pink" style="width:95%"></div></div>
          <span class="bar-pct">95%</span>
        </div>
        <div class="bar-line">
          <span class="bar-name">소비</span>
          <div class="bar-track"><div class="bar-fill bf-purple" style="width:40%"></div></div>
          <span class="bar-pct">4%</span>
        </div>
        <div class="bar-line">
          <span class="bar-name">제작</span>
          <div class="bar-track"><div class="bar-fill bf-yellow" style="width:10%"></div></div>
          <span class="bar-pct">1%</span>
        </div>
      </div>
    </div>

    <div class="row">
      <span class="row-label">선호 장르</span>
      <div class="row-content">
        <span class="plain-text">다 먹음 🍰</span>
      </div>
    </div>

    <div class="row">
      <span class="row-label">커플링</span>
      <div class="row-content">
        <span class="tag t-purple">BL</span>
        <span class="tag t-pink">GL</span>
        <span class="tag t-blue">HL</span>
        <span class="tag t-mint">다 먹음</span>
      </div>
    </div>

    <div class="row">
      <span class="row-label">NG</span>
      <div class="row-content">
        <span class="plain-text">알아서 피함 👀</span>
      </div>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="card-bottom">
    <span class="strip-item">✦ 헤어질 땐</span>
    <span class="sep">·</span>
    <span class="strip-item">블언블</span>
    <span class="sep">·</span>
    <span class="strip-item">꽃길만 걸으시길 ✦</span>
  </div>

</div>

</body>
</html>
